<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathPath Class Lesson</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <nav class="nav">
        <div class="logo">📘 MathPath Academy</div>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="#class-quiz">Class Quiz</a>
        </div>
      </nav>
      <div class="hero-content left">
        <p class="lesson-kicker" id="lesson-kicker">Class 1 of 6</p>
        <h1 id="lesson-title">Number Skills</h1>
        <p id="lesson-goal">Loading lesson...</p>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="lesson-viewer-box">
          <div class="lesson-block">
            <h3>Core Example</h3>
            <p id="lesson-example">Loading...</p>
          </div>
          <div class="lesson-block">
            <h3>Try This Problem</h3>
            <p id="lesson-try">Loading...</p>
          </div>

          <div class="viewer-actions">
            <a class="btn secondary" id="prev-class-link" href="lesson.html?class=0">Previous class</a>
            <a class="btn" id="next-class-link" href="lesson.html?class=1">Next class</a>
          </div>
        </div>
      </section>

      <section class="section muted" id="class-quiz">
        <h2>Class Quiz</h2>
        <p class="section-subtitle">Answer this question for the current class.</p>

        <div class="practice-box">
          <p id="quiz-question">Loading question...</p>
          <label for="quiz-answer">Your answer:</label>
          <input id="quiz-answer" type="number" placeholder="Type a number" />
          <div class="viewer-actions">
            <button class="btn" id="quiz-check">Check answer</button>
            <button class="btn secondary" id="mark-complete">Mark class complete</button>
          </div>
          <p id="quiz-feedback" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <footer>
      <a href="index.html">← Back to dashboard</a>
    </footer>

    <script src="lesson.js"></script>
  </body>
</html>
